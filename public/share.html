<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shadow Drop | Secure Download</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="auth-wrapper active">
    <div class="login-container">
      <header class="auth-header">
        <h1>Shadow Drop</h1>
        <p>Secure Download</p>
      </header>

      <!-- Loading State -->
      <div id="share-loading" class="panel" style="text-align:center;">
        <p class="text-muted">Loading share information...</p>
      </div>

      <!-- Error State -->
      <div id="share-error" class="panel hidden">
        <div class="share-error-icon" style="text-align:center; font-size:3rem; margin-bottom:1rem;">🚫</div>
        <h2 style="text-align:center; margin-bottom:0.5rem;">Link Unavailable</h2>
        <p id="share-error-msg" class="text-muted" style="text-align:center;"></p>
      </div>

      <!-- Download Form -->
      <div id="share-form" class="panel hidden">
        <div class="share-file-info">
          <div class="share-file-icon">📄</div>
          <div class="share-file-meta">
            <div id="share-filename" class="share-filename"></div>
            <div id="share-filesize" class="share-filesize"></div>
          </div>
        </div>

        <div id="share-message-box" class="message-box hidden">
          <h4>Message from sender</h4>
          <p id="share-message"></p>
        </div>

        <div id="share-limits" class="share-limits"></div>

        <div class="form-group">
          <label for="share-password">Unlock Password</label>
          <input type="password" id="share-password" placeholder="Enter the unlock password" autocomplete="off">
        </div>

        <button id="btn-share-download" class="btn primary full-width">🔓 Decrypt & Download</button>
        <div id="share-msg" class="msg"></div>
      </div>

      <!-- Success State -->
      <div id="share-success" class="panel hidden" style="text-align:center;">
        <div style="font-size:3rem; margin-bottom:1rem;">✅</div>
        <h2 style="margin-bottom:0.5rem;">Download Complete</h2>
        <p class="text-muted">The file has been decrypted and downloaded successfully.</p>
      </div>
    </div>
  </div>

  <script src="crypto.js"></script>
  <script src="share.js"></script>
</body>
</html>
